<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Training Call</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --line: #232830;
    --text: #e8eaed;
    --muted: #8b93a1;
    --accent: #4fd1c5;
    --danger: #e0556f;
    --warn: #e3b341;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    padding-top: calc(14px + env(safe-area-inset-top));
    padding-left: calc(18px + env(safe-area-inset-left));
    padding-right: calc(18px + env(safe-area-inset-right));
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
    max-height: 200px;
    overflow: hidden;
  }
  .title { font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
  .status {
    font-size: 13px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.live { background: var(--accent); animation: pulse 2s infinite; }
  .dot.warn { background: var(--warn); }
  .dot.bad { background: var(--danger); }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(79,209,197,0.5); }
    70% { box-shadow: 0 0 0 6px rgba(79,209,197,0); }
    100% { box-shadow: 0 0 0 0 rgba(79,209,197,0); }
  }

  main {
    position: relative;
    flex: 1;
    background: #000;
    overflow: hidden;
    min-height: 0;
  }
  video#remote {
    width: 100%; height: 100%; object-fit: contain; background: #000;
    touch-action: none;
    transform-origin: center center;
  }
  video#local {
    position: absolute;
    width: 19%;
    max-width: 150px;
    min-width: 84px;
    right: calc(14px + env(safe-area-inset-right));
    bottom: calc(14px + env(safe-area-inset-bottom));
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #000;
    transform: scaleX(-1);
    transition: width 0.2s ease, height 0.2s ease, opacity 0.2s ease, border-radius 0.2s ease;
    cursor: pointer;
  }
  /* Tapping the self-preview shrinks it to a small, mostly-out-of-the-way
     circle — useful when it's sitting on top of something the trainer
     needs to see. Tap again to restore. */
  video#local.minimized {
    width: 44px !important;
    max-width: 44px !important;
    min-width: 44px !important;
    height: 44px !important;
    border-radius: 50%;
    opacity: 0.6;
    object-fit: cover;
  }
  .placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; color: var(--muted); text-align: center; padding: 0 24px;
  }
  .placeholder .big { font-size: 16px; color: var(--text); }
  .placeholder .small { font-size: 13px; max-width: 320px; }

  footer {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    padding-left: calc(16px + env(safe-area-inset-left));
    padding-right: calc(16px + env(safe-area-inset-right));
    border-top: 1px solid var(--line);
    flex-shrink: 0;
    background: var(--panel);
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
    max-height: 260px;
    overflow: hidden;
  }

  /* Fullscreen auto-hide: header/footer collapse away after a few seconds of
     inactivity so the video fills the screen, and fade back in on any
     mouse move, tap, or keypress. */
  body.chrome-hidden header,
  body.chrome-hidden footer {
    max-height: 0;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
    border-color: transparent;
  }
  select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-size: 13px; max-width: 170px;
  }
  button {
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
    border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 500;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.active-off { background: rgba(224,85,111,0.15); border-color: var(--danger); color: var(--danger); }
  button.primary { background: var(--accent); color: #06201d; border-color: var(--accent); }
  button.primary.end { background: var(--danger); border-color: var(--danger); color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }

  .controls-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }

  @media (max-width: 520px) {
    select { max-width: 130px; font-size: 12px; }
    button { padding: 9px 12px; font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="title">Training Call</div>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Not connected</span></div>
</header>

<main>
  <video id="remote" autoplay playsinline></video>
  <div class="placeholder" id="placeholder">
    <div class="big">Connecting…</div>
    <div class="small" id="placeholderSub">This starts automatically. Send this same link to the other side — whoever opens it second connects the call.</div>
  </div>
  <video id="local" autoplay playsinline muted></video>
</main>

<footer>
  <div class="controls-row">
    <select id="cameraSelect" title="Camera"></select>
    <select id="micSelect" title="Microphone"></select>
  </div>
  <div class="controls-row">
    <button id="muteBtn">Mute</button>
    <button id="camBtn">Camera off</button>
    <button id="fullscreenBtn">Fullscreen</button>
    <button id="callBtn" class="primary">Start Call</button>
  </div>
</footer>

<script>
(() => {
  const remoteVideo = document.getElementById('remote');
  const localVideo = document.getElementById('local');
  const cameraSelect = document.getElementById('cameraSelect');
  const micSelect = document.getElementById('micSelect');
  const muteBtn = document.getElementById('muteBtn');
  const camBtn = document.getElementById('camBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const callBtn = document.getElementById('callBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const placeholder = document.getElementById('placeholder');
  const placeholderSub = document.getElementById('placeholderSub');

  const LS_CAMERA = 'trainingCall:cameraId';
  const LS_MIC = 'trainingCall:micId';
  const LS_HAS_CONNECTED = 'trainingCall:hasConnectedBefore';

  const params = new URLSearchParams(location.search);
  const room = params.get('room') || 'gym-session';

  // Google's public STUN servers — free, no signup, fine for most home networks.
  // ICE tries these (and any direct path) first; they're enough for wifi-to-wifi calls.
  //
  // TURN fallback (Metered.ca free tier, 20GB/month) — only used if a direct/STUN
  // path can't be found (e.g. restrictive cellular networks). Credentials below are
  // tied to our free account quota, not a security secret — TURN creds are meant to
  // ship to the client, that's how the protocol works. If the call connects fine
  // without it (most sessions will), these entries simply go unused.
  const ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun.relay.metered.ca:80' },
    {
      urls: 'turn:standard.relay.metered.ca:80',
      username: '3781fe1f6d857864a846de77',
      credential: 'epirZplvHuT7vJb1'
    },
    {
      urls: 'turn:standard.relay.metered.ca:80?transport=tcp',
      username: '3781fe1f6d857864a846de77',
      credential: 'epirZplvHuT7vJb1'
    },
    {
      urls: 'turn:standard.relay.metered.ca:443',
      username: '3781fe1f6d857864a846de77',
      credential: 'epirZplvHuT7vJb1'
    },
    {
      urls: 'turns:standard.relay.metered.ca:443?transport=tcp',
      username: '3781fe1f6d857864a846de77',
      credential: 'epirZplvHuT7vJb1'
    }
  ];

  let localStream = null;
  let pc = null;
  let ws = null;
  let inCall = false;
  let pendingCandidates = [];
  let amCaller = false; // only the caller initiates ICE restarts, to avoid both sides colliding
  let disconnectTimer = null;
  let iceRestartAttempts = 0;
  const MAX_ICE_RESTARTS = 4;

  // Pinch-to-zoom / double-tap-to-zoom on the remote video specifically.
  // This is deliberately implemented as our own CSS transform on the video
  // element rather than relying on the browser's page-level zoom (which we
  // disabled in the viewport meta tag, since native page zoom on a live
  // video stream caused freezes/disconnects). Scoping it to just this
  // element keeps the rest of the page (and the connection) untouched.
  let remoteZoom = 1;
  let remotePanX = 0;
  let remotePanY = 0;
  let pinchStartDist = 0;
  let pinchStartZoom = 1;
  let lastTapTime = 0;
  let lastTapX = 0;
  let lastTapY = 0;
  let panActive = false;
  let panStartX = 0;
  let panStartY = 0;
  let panOriginX = 0;
  let panOriginY = 0;
  const MAX_REMOTE_ZOOM = 4;
  const DOUBLE_TAP_ZOOM = 2.5;

  function setStatus(text, mode) {
    statusText.textContent = text;
    statusDot.className = 'dot' + (mode ? ' ' + mode : '');
  }

  function setPlaceholder(big, small, show) {
    placeholder.style.display = show ? 'flex' : 'none';
    if (big !== null) placeholder.querySelector('.big').textContent = big;
    if (small !== undefined && small !== null) placeholderSub.textContent = small;
  }

  async function listDevices() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const prevCam = cameraSelect.value || localStorage.getItem(LS_CAMERA);
    const prevMic = micSelect.value || localStorage.getItem(LS_MIC);
    cameraSelect.innerHTML = '';
    micSelect.innerHTML = '';
    let camCount = 0, micCount = 0;
    devices.forEach((d) => {
      if (d.kind === 'videoinput') {
        camCount++;
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Camera ${camCount}`;
        cameraSelect.appendChild(opt);
      } else if (d.kind === 'audioinput') {
        micCount++;
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Microphone ${micCount}`;
        micSelect.appendChild(opt);
      }
    });
    if (prevCam && [...cameraSelect.options].some((o) => o.value === prevCam)) cameraSelect.value = prevCam;
    if (prevMic && [...micSelect.options].some((o) => o.value === prevMic)) micSelect.value = prevMic;
  }

  async function startLocalStream() {
    const videoId = cameraSelect.value || undefined;
    const audioId = micSelect.value || undefined;
    const constraints = {
      video: videoId ? { deviceId: { exact: videoId } } : true,
      audio: audioId ? { deviceId: { exact: audioId } } : true
    };

    const newStream = await navigator.mediaDevices.getUserMedia(constraints);

    if (localStream) {
      localStream.getTracks().forEach((t) => t.stop());
    }
    localStream = newStream;
    localVideo.srcObject = localStream;

    if (pc) {
      const videoTrack = localStream.getVideoTracks()[0];
      const audioTrack = localStream.getAudioTracks()[0];
      const senders = pc.getSenders();
      const vSender = senders.find((s) => s.track && s.track.kind === 'video');
      const aSender = senders.find((s) => s.track && s.track.kind === 'audio');
      if (vSender && videoTrack) vSender.replaceTrack(videoTrack);
      if (aSender && audioTrack) aSender.replaceTrack(audioTrack);
    }
  }

  async function init() {
    try {
      // Request permission once with defaults so device labels become visible,
      // then list devices properly.
      const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      tempStream.getTracks().forEach((t) => t.stop());
      await listDevices();
      navigator.mediaDevices.ondevicechange = listDevices;
      // Opening the page is meant to be the only step on repeat visits — but
      // on the very first visit from a given browser, skip the auto-start so
      // there's a calm window (with Safari's normal toolbar still visible)
      // to set up "Add to Home Screen" before the page takes over the screen.
      if (localStorage.getItem(LS_HAS_CONNECTED)) {
        startCallFlow();
      } else {
        setPlaceholder('Ready when you are', 'First time here: feel free to set up "Add to Home Screen" now, then tap Start Call. After this, it\'ll connect automatically every time.', true);
      }
    } catch (err) {
      setPlaceholder('Camera or microphone blocked', 'Allow camera and microphone access for this page in your browser settings, then reload.', true);
      setStatus('Permission needed', 'bad');
    }
  }

  function wsUrl() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${proto}//${location.host}?room=${encodeURIComponent(room)}`;
  }

  function connectSignaling() {
    ws = new WebSocket(wsUrl());

    ws.onopen = () => {
      setStatus('Waiting for the other side to join…', 'warn');
    };

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'joined') {
        if (msg.peers === 2) {
          amCaller = true;
          await createPeerConnection();
          await makeOffer();
        }
      } else if (msg.type === 'peer-joined') {
        setStatus('Other side joined — connecting…', 'warn');
        if (!pc) await createPeerConnection();
      } else if (msg.type === 'offer') {
        if (!pc) await createPeerConnection();
        await pc.setRemoteDescription(new RTCSessionDescription(msg));
        await flushPendingCandidates();
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        send({ type: 'answer', sdp: answer.sdp });
      } else if (msg.type === 'answer') {
        await pc.setRemoteDescription(new RTCSessionDescription(msg));
        await flushPendingCandidates();
      } else if (msg.type === 'candidate') {
        if (pc && pc.remoteDescription) {
          try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch (e) {}
        } else {
          pendingCandidates.push(msg.candidate);
        }
      } else if (msg.type === 'peer-left') {
        setStatus('Other side disconnected', 'warn');
        setPlaceholder('Call ended', 'The other side left. Tap Start Call to begin a new session.', true);
        teardownPeerConnection();
      } else if (msg.type === 'full') {
        setStatus('Room already has two people', 'bad');
        setPlaceholder('Call already in progress', 'This link is already connected on two devices.', true);
      }
    };

    ws.onclose = () => {
      if (inCall) {
        setStatus('Signaling lost — retrying…', 'bad');
        setTimeout(() => { if (inCall) connectSignaling(); }, 2000);
      }
    };

    ws.onerror = () => {
      setStatus('Connection error', 'bad');
    };
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
  }

  async function flushPendingCandidates() {
    for (const c of pendingCandidates) {
      try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch (e) {}
    }
    pendingCandidates = [];
  }

  async function createPeerConnection() {
    pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

    localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));

    pc.onicecandidate = (event) => {
      if (event.candidate) send({ type: 'candidate', candidate: event.candidate });
    };

    pc.ontrack = (event) => {
      remoteVideo.srcObject = event.streams[0];
      setPlaceholder(null, null, false);
    };

    pc.onconnectionstatechange = () => {
      if (!pc) return;
      if (pc.connectionState === 'connected') {
        setStatus('Connected', 'live');
        setPlaceholder(null, null, false);
        clearTimeout(disconnectTimer);
        iceRestartAttempts = 0; // reset once the connection is stably back
        localStorage.setItem(LS_HAS_CONNECTED, 'true');
      } else if (pc.connectionState === 'disconnected') {
        // 'disconnected' often self-heals within a few seconds (a brief
        // Wi-Fi blip, a tab losing focus momentarily, etc.) — give it a
        // short grace period before trying anything ourselves.
        setStatus('Connection wobbling — recovering…', 'warn');
        clearTimeout(disconnectTimer);
        disconnectTimer = setTimeout(attemptIceRestart, 4000);
      } else if (pc.connectionState === 'failed') {
        setStatus('Connection lost — reconnecting…', 'bad');
        clearTimeout(disconnectTimer);
        attemptIceRestart();
      } else if (pc.connectionState === 'connecting') {
        setStatus('Connecting…', 'warn');
      }
    };
  }

  async function attemptIceRestart() {
    if (!pc || !amCaller) return; // only the caller renegotiates, to avoid both sides colliding
    if (pc.connectionState === 'connected') return; // already recovered on its own
    if (iceRestartAttempts >= MAX_ICE_RESTARTS) {
      setStatus('Connection lost', 'bad');
      setPlaceholder('Connection lost', 'Tap End Call, then Start Call again to reconnect.', true);
      return;
    }
    iceRestartAttempts++;
    try {
      const offer = await pc.createOffer({ iceRestart: true });
      await pc.setLocalDescription(offer);
      send({ type: 'offer', sdp: offer.sdp });
    } catch (e) {
      // If this attempt fails to even start, the next state-change event
      // (or the timer above) will trigger another try, up to the cap.
    }
  }

  async function makeOffer() {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    send({ type: 'offer', sdp: offer.sdp });
  }

  function teardownPeerConnection() {
    if (pc) { pc.close(); pc = null; }
    remoteVideo.srcObject = null;
    pendingCandidates = [];
    clearTimeout(disconnectTimer);
    amCaller = false;
    iceRestartAttempts = 0;
    resetRemoteZoom();
  }

  async function startCallFlow() {
    if (inCall) return;
    inCall = true;
    callBtn.textContent = 'End Call';
    callBtn.classList.add('end');
    setPlaceholder('Connecting…', 'Waiting for the other side to join…', true);
    try {
      if (!localStream) await startLocalStream();
      connectSignaling();
    } catch (err) {
      setStatus('Could not access camera/mic', 'bad');
      inCall = false;
      callBtn.textContent = 'Start Call';
      callBtn.classList.remove('end');
    }
  }

  function endCallFlow() {
    inCall = false;
    callBtn.textContent = 'Start Call';
    callBtn.classList.remove('end');
    teardownPeerConnection();
    if (ws) { ws.close(); ws = null; }
    setStatus('Not connected', '');
    setPlaceholder('Call ended', 'Tap Start Call to begin a new session.', true);
  }

  callBtn.addEventListener('click', () => {
    if (!inCall) startCallFlow(); else endCallFlow();
  });

  // --- Fullscreen + auto-hiding controls -----------------------------------
  // Goal: while in fullscreen, the header and footer fade away after a few
  // seconds so the video fills the whole screen, then reappear the moment
  // the mouse moves, the screen is tapped, or a key is pressed.
  let hideTimer = null;

  function revealChrome() {
    document.body.classList.remove('chrome-hidden');
    clearTimeout(hideTimer);
    if (document.fullscreenElement) {
      hideTimer = setTimeout(() => {
        document.body.classList.add('chrome-hidden');
      }, 3000);
    }
  }

  document.addEventListener('mousemove', revealChrome);
  document.addEventListener('touchstart', revealChrome);
  document.addEventListener('keydown', revealChrome);

  document.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement) {
      fullscreenBtn.textContent = 'Exit Fullscreen';
      revealChrome();
    } else {
      fullscreenBtn.textContent = 'Fullscreen';
      clearTimeout(hideTimer);
      document.body.classList.remove('chrome-hidden');
    }
  });

  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  // iOS (iPhone/iPad) doesn't reliably support page-level fullscreen — on
  // some iOS versions the API reports itself as "available" but actually
  // calling it on a page like this one freezes the video. Rather than trust
  // that self-reported support, detect iOS directly and hide the button
  // there unconditionally. The real fullscreen equivalent on iOS is opening
  // this page from a Home Screen icon (Share → Add to Home Screen), which
  // hides Safari's own chrome automatically and works reliably.
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS often reports as Mac
  const supportsPageFullscreen = !isIOS && document.fullscreenEnabled &&
    typeof document.documentElement.requestFullscreen === 'function';
  if (!supportsPageFullscreen) {
    fullscreenBtn.style.display = 'none';
  }

  muteBtn.addEventListener('click', () => {
    if (!localStream) return;
    const track = localStream.getAudioTracks()[0];
    if (!track) return;
    track.enabled = !track.enabled;
    muteBtn.textContent = track.enabled ? 'Mute' : 'Unmute';
    muteBtn.classList.toggle('active-off', !track.enabled);
  });

  camBtn.addEventListener('click', () => {
    if (!localStream) return;
    const track = localStream.getVideoTracks()[0];
    if (!track) return;
    track.enabled = !track.enabled;
    camBtn.textContent = track.enabled ? 'Camera on' : 'Camera off';
    camBtn.classList.toggle('active-off', !track.enabled);
  });

  localVideo.addEventListener('click', () => {
    localVideo.classList.toggle('minimized');
  });

  function applyRemoteTransform() {
    remoteVideo.style.transform = `translate(${remotePanX}px, ${remotePanY}px) scale(${remoteZoom})`;
  }

  function clampRemotePan() {
    const maxOffset = (remoteZoom - 1) * 250;
    remotePanX = Math.max(-maxOffset, Math.min(maxOffset, remotePanX));
    remotePanY = Math.max(-maxOffset, Math.min(maxOffset, remotePanY));
  }

  function resetRemoteZoom() {
    remoteZoom = 1;
    remotePanX = 0;
    remotePanY = 0;
    applyRemoteTransform();
  }

  remoteVideo.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartZoom = remoteZoom;
      panActive = false;
    } else if (e.touches.length === 1) {
      const t = e.touches[0];
      const now = Date.now();
      const movedSinceLastTap = Math.hypot(t.clientX - lastTapX, t.clientY - lastTapY);

      if (now - lastTapTime < 350 && movedSinceLastTap < 40) {
        // Double tap: toggle between normal and a fixed zoomed-in level.
        remoteZoom = remoteZoom > 1 ? 1 : DOUBLE_TAP_ZOOM;
        remotePanX = 0;
        remotePanY = 0;
        applyRemoteTransform();
        lastTapTime = 0;
      } else {
        lastTapTime = now;
        lastTapX = t.clientX;
        lastTapY = t.clientY;
      }

      if (remoteZoom > 1) {
        panActive = true;
        panStartX = t.clientX;
        panStartY = t.clientY;
        panOriginX = remotePanX;
        panOriginY = remotePanY;
      }
    }
  }, { passive: true });

  remoteVideo.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && pinchStartDist > 0) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      remoteZoom = Math.min(MAX_REMOTE_ZOOM, Math.max(1, pinchStartZoom * (dist / pinchStartDist)));
      clampRemotePan();
      applyRemoteTransform();
    } else if (e.touches.length === 1 && panActive && remoteZoom > 1) {
      e.preventDefault();
      const t = e.touches[0];
      remotePanX = panOriginX + (t.clientX - panStartX);
      remotePanY = panOriginY + (t.clientY - panStartY);
      clampRemotePan();
      applyRemoteTransform();
    }
  }, { passive: false });

  remoteVideo.addEventListener('touchend', () => {
    panActive = false;
    pinchStartDist = 0;
    if (remoteZoom < 1.05) resetRemoteZoom();
  }, { passive: true });

  // Also support double-click on desktop for the same zoom toggle.
  remoteVideo.addEventListener('dblclick', () => {
    remoteZoom = remoteZoom > 1 ? 1 : DOUBLE_TAP_ZOOM;
    remotePanX = 0;
    remotePanY = 0;
    applyRemoteTransform();
  });

  window.addEventListener('orientationchange', resetRemoteZoom);

  cameraSelect.addEventListener('change', () => {
    localStorage.setItem(LS_CAMERA, cameraSelect.value);
    if (localStream) startLocalStream();
  });
  micSelect.addEventListener('change', () => {
    localStorage.setItem(LS_MIC, micSelect.value);
    if (localStream) startLocalStream();
  });

  init();
})();
</script>
</body>
</html>
